<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Бесплатное расширение Chrome для подключения к прокси VLESS, VMess, Trojan, Shadowsocks, Hysteria2 и Reality через локальный sing-box."
    />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://chrome.google.com" />
    <link rel="preconnect" href="https://github.com" />
    <title>Noctis — расширение VLESS для браузера Chrome</title>
    <script>
      (function () {
        try {
          document.documentElement.classList.add(
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/entries/home.ru.tsx"></script>
  </body>
</html>
